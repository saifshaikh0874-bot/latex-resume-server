<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LaTeX Editor</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/theme/eclipse.min.css">

<style>

body{
margin:0;
font-family:Arial;
height:100vh;
display:flex;
flex-direction:column;
}

/* TOP BAR */

.topbar{
background:#1e3a5f;
color:white;
padding:10px 20px;
display:flex;
justify-content:space-between;
align-items:center;
}

.title{
font-weight:bold;
font-size:18px;
}

.actions button{
margin-left:10px;
padding:7px 16px;
border:none;
border-radius:20px;
cursor:pointer;
font-weight:bold;
}

.compile{
background:#28a47e;
color:white;
}

.download{
background:#3498db;
color:white;
}

/* MAIN LAYOUT */

.container{
flex:1;
display:flex;
overflow:hidden;
}

/* LEFT FILE TREE */

.sidebar{
width:220px;
background:#f5f7fa;
border-right:1px solid #ddd;
padding:15px;
}

.file{
padding:6px;
cursor:pointer;
border-radius:4px;
}

.file:hover{
background:#e8edf3;
}

/* EDITOR */

.editor{
flex:1;
display:flex;
flex-direction:column;
}

.CodeMirror{
height:100%;
font-size:14px;
}

/* PDF PANEL */

.preview{
width:420px;
border-left:1px solid #ddd;
display:flex;
flex-direction:column;
}

.preview-header{
background:#f1f1f1;
padding:10px;
font-weight:bold;
border-bottom:1px solid #ddd;
}

iframe{
flex:1;
border:none;
}

/* LOGS */

.logs{
height:120px;
border-top:1px solid #ddd;
background:#fafafa;
font-family:monospace;
padding:10px;
font-size:12px;
overflow:auto;
}

</style>

</head>

<body>

<div class="topbar">

<div class="title">LaTeX Resume Editor</div>

<div class="actions">

<button class="compile" id="compileBtn">Recompile</button>

<button class="download" id="downloadBtn">Download PDF</button>

</div>

</div>

<div class="container">

<div class="sidebar">

<div class="file">main.tex</div>
<div class="file">resume.tex</div>

</div>

<div class="editor">

<textarea id="editor">

\documentclass{article}

\begin{document}

Hello Saif

\section*{Experience}

Sales Professional with 2+ years experience.

\end{document}

</textarea>

</div>

<div class="preview">

<div class="preview-header">

PDF Preview

</div>

<iframe id="pdf"></iframe>

<div class="logs" id="logs">

Ready.

</div>

</div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/stex/stex.min.js"></script>

<script>

const editor = CodeMirror.fromTextArea(

document.getElementById("editor"),

{

lineNumbers:true,

mode:"stex",

theme:"eclipse",

lineWrapping:true

}

)

const compileBtn=document.getElementById("compileBtn")

const downloadBtn=document.getElementById("downloadBtn")

const pdf=document.getElementById("pdf")

const logs=document.getElementById("logs")

function compile(){

logs.innerText="Compiling..."

fetch("/compile",{

method:"POST",

headers:{

"Content-Type":"application/x-www-form-urlencoded"

},

body:"latex="+encodeURIComponent(editor.getValue())

})

.then(res=>res.text())

.then(data=>{

logs.innerText="Compilation successful."

pdf.src="/resume.pdf?"+Date.now()

})

.catch(()=>{

logs.innerText="Compilation error."

})

}

compileBtn.onclick=compile

downloadBtn.onclick=()=>{

const a=document.createElement("a")

a.href="/resume.pdf?"+Date.now()

a.download="resume.pdf"

a.click()

}

</script>

</body>

</html>
