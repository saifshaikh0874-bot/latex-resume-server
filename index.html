<!DOCTYPE html>
<html>

<head>
<title>LaTeX Resume Builder</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
margin:0;
font-family:Arial;
height:100vh;
display:flex;
flex-direction:column;
}

/* TOP BAR */

#topbar{
background:#1f2937;
color:white;
padding:10px;
display:flex;
align-items:center;
gap:20px;
}

#topbar button{
background:#22c55e;
border:none;
padding:8px 15px;
color:white;
cursor:pointer;
}

/* MAIN LAYOUT */

#container{
flex:1;
display:flex;
}

/* FILE TREE */

#filetree{
width:200px;
background:#111827;
color:white;
padding:10px;
}

/* EDITOR */

#editor{
width:50%;
background:#1e1e1e;
color:white;
display:flex;
flex-direction:column;
}

#editor textarea{
flex:1;
background:#1e1e1e;
color:white;
border:none;
padding:15px;
font-family:monospace;
font-size:14px;
}

/* PDF PREVIEW */

#preview{
width:50%;
background:#f3f4f6;
display:flex;
flex-direction:column;
}

iframe{
flex:1;
border:none;
background:white;
}

</style>

</head>

<body>

<div id="topbar">

<b>LaTeX Resume Builder</b>

<button onclick="compileLatex()">
<i class="fa fa-play"></i> Recompile
</button>

</div>

<div id="container">

<div id="filetree">

<b>File tree</b>
<hr>

📄 main.tex

</div>

<div id="editor">

<textarea id="latex">\documentclass{article}

\begin{document}

Hello Saif

\section*{Experience}

Sales Professional with 2+ years experience.

\end{document}</textarea>

</div>

<div id="preview">

<iframe id="pdf"></iframe>

</div>

</div>

<script>

function compileLatex(){

fetch("/compile",{
method:"POST",
headers:{
"Content-Type":"application/x-www-form-urlencoded"
},
body:"latex="+encodeURIComponent(document.getElementById("latex").value)
})
.then(res=>res.text())
.then(data=>{

if(data==="ok"){
document.getElementById("pdf").src="/resume.pdf?"+Date.now();
}

});

}

window.onload=function(){
document.getElementById("pdf").src="/resume.pdf";
}

</script>

</body>
</html>
