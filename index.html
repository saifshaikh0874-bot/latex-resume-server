<!DOCTYPE html>
<html>

<head>
<title>Latex Resume Builder</title>

<style>

body{
margin:0;
font-family:Arial;
display:flex;
height:100vh;
overflow:hidden;
}

#editor{
width:50%;
padding:20px;
background:#1e1e1e;
color:white;
display:flex;
flex-direction:column;
}

textarea{
flex:1;
width:100%;
background:#1e1e1e;
color:white;
border:none;
font-family:monospace;
font-size:14px;
outline:none;
}

#preview{
width:50%;
background:#f5f5f5;
display:flex;
flex-direction:column;
}

#toolbar{
background:#2c3e50;
color:white;
padding:10px;
display:flex;
align-items:center;
}

button{
background:#27ae60;
border:none;
padding:8px 15px;
color:white;
cursor:pointer;
font-weight:bold;
}

button:hover{
background:#219150;
}

iframe{
flex:1;
border:none;
background:white;
}

</style>
</head>

<body>

<div id="editor">

<h3>LaTeX Editor</h3>

<textarea id="latex">\documentclass{article}

\begin{document}

Hello Saif

\section*{Experience}

Sales Professional with 2+ years experience.

\end{document}
</textarea>

</div>

<div id="preview">

<div id="toolbar">

<button onclick="compileLatex()">Recompile</button>

</div>

<iframe id="pdf"></iframe>

</div>

<script>

function compileLatex(){

const latexCode = document.getElementById("latex").value;

fetch("/compile",{
method:"POST",
headers:{
"Content-Type":"application/x-www-form-urlencoded"
},
body:"latex="+encodeURIComponent(latexCode)
})
.then(res=>res.text())
.then(data=>{

if(data === "ok"){
document.getElementById("pdf").src="/resume.pdf?"+Date.now();
}else{
alert("Compilation Error. Check LaTeX code.");
}

})
.catch(err=>{
alert("Server error");
});

}

// load PDF when page opens
window.onload = function(){
document.getElementById("pdf").src="/resume.pdf";
}

</script>

</body>

</html>
