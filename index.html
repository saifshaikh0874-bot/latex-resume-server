<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LaTeX Resume Builder</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/theme/eclipse.min.css">

<style>

body{
margin:0;
font-family:Arial;
display:flex;
flex-direction:column;
height:100vh;
}

.topbar{
background:#1e3a5f;
color:white;
padding:10px 20px;
display:flex;
justify-content:space-between;
align-items:center;
}

.compile{
background:#28a47e;
border:none;
padding:8px 18px;
color:white;
font-weight:bold;
border-radius:20px;
cursor:pointer;
}

.main{
display:flex;
flex:1;
overflow:hidden;
}

.editor{
width:50%;
border-right:1px solid #ddd;
display:flex;
flex-direction:column;
}

.preview{
width:50%;
display:flex;
flex-direction:column;
}

.CodeMirror{
height:100%;
font-size:14px;
}

.toolbar{
background:#f1f1f1;
padding:10px;
border-bottom:1px solid #ddd;
}

.download{
background:#3498db;
border:none;
padding:6px 14px;
color:white;
border-radius:4px;
cursor:pointer;
margin-left:10px;
}

iframe{
flex:1;
border:none;
}

.logs{
height:120px;
background:#fafafa;
border-top:1px solid #ddd;
font-family:monospace;
padding:10px;
overflow:auto;
font-size:12px;
}

</style>
</head>

<body>

<div class="topbar">

<div>
<b>LaTeX Resume Builder</b>
</div>

<div>
<button class="compile" id="compileBtn">Recompile</button>
<button class="download" id="downloadBtn">Download PDF</button>
</div>

</div>

<div class="main">

<div class="editor">

<textarea id="latex-editor">

\documentclass{article}
\begin{document}

Hello Saif

\section*{Experience}

Sales Professional with 2+ years experience.

\end{document}

</textarea>

</div>

<div class="preview">

<div class="toolbar">
PDF Preview
</div>

<iframe id="pdf"></iframe>

<div class="logs" id="logs">
Ready.
</div>

</div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/stex/stex.min.js"></script>

<script>

const editor = CodeMirror.fromTextArea(
document.getElementById("latex-editor"),
{
lineNumbers:true,
mode:"stex",
theme:"eclipse",
lineWrapping:true
}
)

const compileBtn = document.getElementById("compileBtn")
const downloadBtn = document.getElementById("downloadBtn")
const pdfFrame = document.getElementById("pdf")
const logs = document.getElementById("logs")

function compileLatex(){

logs.innerText = "Compiling..."

fetch("/compile",{
method:"POST",
headers:{
"Content-Type":"application/x-www-form-urlencoded"
},
body:"latex="+encodeURIComponent(editor.getValue())
})
.then(res=>res.text())
.then(data=>{

logs.innerText = "Compile successful."

pdfFrame.src="/resume.pdf?"+Date.now()

})
.catch(err=>{

logs.innerText="Compile error."

})

}

compileBtn.onclick=compileLatex

downloadBtn.onclick=()=>{

const a=document.createElement("a")
a.href="/resume.pdf?"+Date.now()
a.download="resume.pdf"
document.body.appendChild(a)
a.click()
document.body.removeChild(a)

}

</script>

</body>
</html>
