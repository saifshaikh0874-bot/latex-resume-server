<!DOCTYPE html>
<html>

<head>
<title>LaTeX Resume Builder</title>

<style>

body{
margin:0;
font-family:Arial;
display:flex;
height:100vh;
}

#editor{
width:50%;
padding:20px;
background:#1e1e1e;
color:white;
}

textarea{
width:100%;
height:85%;
background:#1e1e1e;
color:white;
border:none;
font-family:monospace;
font-size:14px;
}

#preview{
width:50%;
background:#f5f5f5;
display:flex;
flex-direction:column;
}

#toolbar{
background:#2c3e50;
color:white;
padding:10px;
}

button{
background:#27ae60;
border:none;
padding:8px 15px;
color:white;
cursor:pointer;
}

iframe{
flex:1;
border:none;
}

</style>
</head>

<body>

<div id="editor">

<h3>LaTeX Editor</h3>

<textarea id="latex">

\documentclass{article}
\begin{document}

Hello Saif

\section*{Experience}

Sales Professional with 2+ years experience.

\end{document}

</textarea>

</div>

<div id="preview">

<div id="toolbar">

<button onclick="compileLatex()">Recompile</button>

</div>

<iframe id="pdf"></iframe>

</div>

<script>

function compileLatex(){

fetch("/compile",{
method:"POST",
headers:{
"Content-Type":"application/x-www-form-urlencoded"
},
body:"latex="+encodeURIComponent(document.getElementById("latex").value)
})
.then(res=>res.text())
.then(data=>{

document.getElementById("pdf").src="/resume.pdf?"+Date.now()

})

}

</script>

</body>

</html>
